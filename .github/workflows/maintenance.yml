---
name: Maintenance

'on':
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 0'

permissions:
  contents: read

concurrency:
  group: production-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: self-hosted
    environment: production
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Ansible
        run: python -m pip install --requirement requirements-dev.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install --requirements-file ansible/requirements.yml

      - name: Create private inventory
        env:
          ANSIBLE_INVENTORY: ${{ secrets.ANSIBLE_INVENTORY }}
        run: |
          test -n "$ANSIBLE_INVENTORY"
          install -d -m 0700 ansible/inventories/runtime
          printf '%s\n' "$ANSIBLE_INVENTORY" > ansible/inventories/runtime/hosts.yml
          chmod 0600 ansible/inventories/runtime/hosts.yml

      - name: Apply system updates
        working-directory: ansible
        run: >-
          ansible-playbook playbooks/apply_updates.yml
          --inventory inventories/runtime/hosts.yml

      - name: Clean unused Docker resources
        working-directory: ansible
        run: >-
          ansible-playbook playbooks/docker_cleanup.yml
          --inventory inventories/runtime/hosts.yml
