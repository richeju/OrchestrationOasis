---
name: Deploy

'on':
  workflow_dispatch:
    inputs:
      target:
        description: Service or complete stack to deploy
        required: true
        default: full
        type: choice
        options:
          - full
          - apt
          - docker
          - ufw
          - zerotier
          - pcloud
          - dashboard
          - restic
          - prometheus
          - portainer
          - netbox
          - openbao
          - bind_dns
          - k3s
          - yubikey
      check:
        description: Run in check mode without applying changes
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-operations
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Ansible
        run: python -m pip install --requirement requirements-dev.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install --requirements-file ansible/requirements.yml

      - name: Create private inventory
        env:
          ANSIBLE_INVENTORY: ${{ secrets.ANSIBLE_INVENTORY }}
        run: |
          test -n "$ANSIBLE_INVENTORY"
          printf '%s\n' "$ANSIBLE_INVENTORY" > "$RUNNER_TEMP/ansible-inventory.yml"
          chmod 0600 "$RUNNER_TEMP/ansible-inventory.yml"

      - name: Execute deployment
        working-directory: ansible
        env:
          ANSIBLE_DISPLAY_ARGS_TO_STDOUT: 'false'
          PCLOUD_TOKEN: ${{ secrets.PCLOUD_TOKEN }}
          NETBOX_DB_PASSWORD: ${{ secrets.NETBOX_DB_PASSWORD }}
          NETBOX_REDIS_PASSWORD: ${{ secrets.NETBOX_REDIS_PASSWORD }}
          NETBOX_SECRET_KEY: ${{ secrets.NETBOX_SECRET_KEY }}
          NETBOX_API_ENDPOINT: ${{ secrets.NETBOX_API_ENDPOINT }}
          NETBOX_API_TOKEN: ${{ secrets.NETBOX_API_TOKEN }}
          TARGET: ${{ inputs.target }}
          CHECK_MODE: ${{ inputs.check }}
        run: |
          args=(site.yml --inventory "$RUNNER_TEMP/ansible-inventory.yml" --tags "$TARGET")
          if [[ "$TARGET" == "full" ]]; then
            args=(site.yml --inventory "$RUNNER_TEMP/ansible-inventory.yml")
          fi
          if [[ "$CHECK_MODE" == "true" ]]; then
            args+=(--check --diff)
          fi
          ansible-playbook "${args[@]}"

      - name: Remove private inventory
        if: always()
        run: rm -f "$RUNNER_TEMP/ansible-inventory.yml"
