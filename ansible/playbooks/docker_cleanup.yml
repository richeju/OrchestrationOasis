---
- name: Clean up Docker resources
  hosts: docker
  become: true
  tasks:
    - name: Remove stopped containers
      community.docker.docker_prune:
        containers: true

    - name: Remove unused images
      community.docker.docker_prune:
        images: true
        images_filters:
          dangling: false

    - name: Remove unused networks
      community.docker.docker_prune:
        networks: true
