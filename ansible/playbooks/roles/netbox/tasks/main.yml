---
- name: Require explicit approval for the compact NetBox stack
  ansible.builtin.assert:
    that:
      - netbox_compact_stack_confirmed | bool
    fail_msg: >-
      This role deploys the legacy compact NetBox stack and does not match the
      official netbox-docker production deployment. Set
      netbox_compact_stack_confirmed=true only for a reviewed new installation.

- name: Validate NetBox secrets
  ansible.builtin.assert:
    that:
      - netbox_db_password | length >= 16
      - netbox_redis_password | length >= 16
      - netbox_secret_key | length >= 50
    fail_msg: >-
      Configure strong NetBox secrets through Ansible Vault or the
      NETBOX_DB_PASSWORD, NETBOX_REDIS_PASSWORD and NETBOX_SECRET_KEY
      environment variables.
  no_log: true

- name: Detect ZeroTier interface
  ansible.builtin.set_fact:
    netbox_zerotier_interface: "{{ ansible_interfaces | select('match', '^zt') | list | first | default('') }}"

- name: Fail if ZeroTier interface not found
  ansible.builtin.fail:
    msg: "No ZeroTier interface found"
  when: netbox_zerotier_interface | length == 0

- name: Gather ZeroTier IP address
  ansible.builtin.set_fact:
    netbox_zerotier_ip: "{{ hostvars[inventory_hostname]['ansible_' ~ netbox_zerotier_interface]['ipv4']['address'] }}"

- name: Ensure NetBox directory exists
  ansible.builtin.file:
    path: "{{ netbox_dir }}"
    state: directory
    mode: '0755'

- name: Deploy environment files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ netbox_dir }}/{{ item.dest }}"
    mode: '0600'
  loop:
    - {src: 'netbox.env.j2', dest: 'netbox.env'}
    - {src: 'postgres.env.j2', dest: 'postgres.env'}
    - {src: 'redis.env.j2', dest: 'redis.env'}
  loop_control:
    label: "{{ item.dest }}"
  no_log: true

- name: Deploy NetBox configuration
  ansible.builtin.template:
    src: configuration.py.j2
    dest: "{{ netbox_dir }}/configuration.py"
    mode: '0644'

- name: Deploy docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ netbox_dir }}/docker-compose.yml"
    mode: '0644'

- name: Launch NetBox stack
  community.docker.docker_compose_v2:
    project_src: "{{ netbox_dir }}"
    state: present
  register: netbox_compose

- name: Display compose status
  ansible.builtin.debug:
    var: netbox_compose
