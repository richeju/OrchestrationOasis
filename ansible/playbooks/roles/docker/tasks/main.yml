---
- name: Update apt cache and install prerequisites
  ansible.builtin.apt:
    update_cache: true
    name:
      - ca-certificates
      - curl
      - python3-debian
    state: present

- name: Create the apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install the Docker repository signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: https://download.docker.com/linux/debian
    suites: ["{{ ansible_distribution_release }}"]
    components: [stable]
    architectures: ["{{ docker_apt_architecture }}"]
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when: ansible_user is defined

- name: Ensure docker-compose binary is absent (cleanup legacy standalone)
  ansible.builtin.file:
    path: /usr/local/bin/docker-compose
    state: absent

- name: Verify the Docker daemon
  ansible.builtin.command: docker info
  register: docker_info
  changed_when: false
  failed_when: docker_info.rc != 0
