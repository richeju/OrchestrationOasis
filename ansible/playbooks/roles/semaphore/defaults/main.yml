---
semaphore_image: >-
  semaphoreui/semaphore@sha256:f6651f30d5bf962afe13831b579c3e0f02a13a45735f852b4de3225d98859c8e
semaphore_version: "2.18.12"
semaphore_dir: /home/debian/semaphore
semaphore_config_dir: "{{ semaphore_dir }}/config"
semaphore_tmp_dir: "{{ semaphore_dir }}/tmp"
semaphore_runner_dir: "{{ semaphore_dir }}/runner"
semaphore_backup_dir: "{{ semaphore_dir }}/backups"
semaphore_backup_path: "{{ semaphore_backup_dir }}/semaphore.db.pre-docker"
semaphore_migration_marker_path: "{{ semaphore_dir }}/.native-to-docker-migrated"
semaphore_compose_path: "{{ semaphore_dir }}/compose.yml"
semaphore_config_path: "{{ semaphore_config_dir }}/config.json"

# Existing native installation sources. They stay in place for rollback.
semaphore_legacy_config_path: /home/debian/.config/semaphore/config.json
semaphore_state_dir: /home/debian/.semaphore
semaphore_database_path: "{{ semaphore_state_dir }}/semaphore.db"
semaphore_native_unit: semaphore.service
semaphore_native_uid: "1000"
semaphore_native_gid: "1000"

semaphore_container_uid: "1001"
semaphore_container_gid: "0"
semaphore_bind_address: 10.78.0.1
semaphore_host_port: 3001
semaphore_container_port: 3000
semaphore_web_host: "http://{{ semaphore_bind_address }}:{{ semaphore_host_port }}"
semaphore_network_name: semaphore
semaphore_network_subnet: 172.30.0.0/24

# The container reaches the VPS over a dedicated SSH key. No Docker socket or
# host systemd socket is mounted into the container.
semaphore_runner_ssh_host: 10.78.0.1
semaphore_runner_ssh_user: debian
semaphore_runner_source_cidr: "{{ semaphore_network_subnet }}"
semaphore_runner_private_key_path: "{{ semaphore_runner_dir }}/id_ed25519"
semaphore_runner_public_key_path: "{{ semaphore_runner_private_key_path }}.pub"
semaphore_runner_known_hosts_path: "{{ semaphore_runner_dir }}/known_hosts"
semaphore_runner_container_key_path: /run/semaphore-runner/id_ed25519
semaphore_runner_container_known_hosts_path: /run/semaphore-runner/known_hosts
semaphore_authorized_keys_path: /home/debian/.ssh/authorized_keys
semaphore_host_public_key_path: /etc/ssh/ssh_host_ed25519_key.pub

semaphore_manage_runtime: true
semaphore_health_retries: 15
semaphore_health_delay: 2
