---
- name: Validate Duplicati secrets
  ansible.builtin.assert:
    that:
      - duplicati_web_password | length >= 16
      - duplicati_settings_key | length == 0 or duplicati_settings_key | length >= 16
    fail_msg: >-
      Set a strong DUPLICATI_WEB_PASSWORD and, when used, a strong
      DUPLICATI_SETTINGS_KEY through the environment or Ansible Vault.
  no_log: true

- name: Ensure Duplicati directory exists
  ansible.builtin.file:
    path: "{{ duplicati_dir }}"
    state: directory
    mode: '0755'

- name: Deploy docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ duplicati_dir }}/docker-compose.yml"
    mode: '0600'
  no_log: true

- name: Launch Duplicati stack
  community.docker.docker_compose_v2:
    project_src: "{{ duplicati_dir }}"
    state: present
  register: duplicati_compose

- name: Display compose status
  ansible.builtin.debug:
    var: duplicati_compose
