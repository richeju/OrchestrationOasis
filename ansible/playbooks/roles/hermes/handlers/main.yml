---
- name: Reload Hermes user systemd
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.systemd_service:
    scope: user
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "{{ hermes_user_runtime_dir }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path={{ hermes_user_runtime_dir }}/bus"
  when: hermes_manage_gateway | bool

- name: Restart Hermes gateway
  become: true
  become_user: "{{ hermes_user }}"
  ansible.builtin.systemd_service:
    name: "{{ hermes_gateway_service_name }}"
    scope: user
    state: restarted
  environment:
    XDG_RUNTIME_DIR: "{{ hermes_user_runtime_dir }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path={{ hermes_user_runtime_dir }}/bus"
  when:
    - hermes_manage_gateway | bool
    - hermes_gateway_started | bool
