---
- name: Inspect existing Restic password file
  ansible.builtin.stat:
    path: "{{ restic_password_file }}"
  register: restic_password_target
  no_log: true

- name: Guard one-time Restic password provisioning
  ansible.builtin.assert:
    that:
      - not restic_password_target.stat.exists
      - restic_repository_password | length >= 24
    fail_msg: >-
      Password provisioning is only allowed when the target file does not
      exist and a password of at least 24 characters is supplied. Rotate an
      existing repository with restic key commands, never by replacing its
      password file.
  when: restic_provision_password_file | bool
  no_log: true

- name: Provision a new Restic repository password file
  ansible.builtin.copy:
    dest: "{{ restic_password_file }}"
    content: "{{ restic_repository_password }}\n"
    owner: root
    group: root
    mode: "0600"
    force: false
  when: restic_provision_password_file | bool
  no_log: true
