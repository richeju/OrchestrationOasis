---
restic_backup_name: infraforge-backup
restic_repository: rclone:pcloud-backup:Backups/infraforge-vps
restic_rclone_remote: pcloud-backup
restic_rclone_config: /root/.config/rclone/rclone.conf
restic_password_file: /root/.config/restic/infraforge-repo.pass
restic_environment_file: /root/.config/restic/infraforge.env
restic_repository_password: >-
  {{ lookup('ansible.builtin.env', 'RESTIC_REPOSITORY_PASSWORD') | default('', true) }}
restic_provision_password_file: false
restic_cache_dir: /var/cache/restic
restic_script_path: /usr/local/sbin/infraforge-backup.sh
restic_audit_script_path: /usr/local/sbin/infraforge-backup-audit.sh
restic_application_backup_enabled: false
restic_application_backup_root: /var/backups/infraforge
restic_application_backup_script_path: /usr/local/sbin/infraforge-backup-prepare.sh

restic_netbox_backup_enabled: false
restic_netbox_postgres_container: netbox-postgres-1
restic_netbox_container: netbox-netbox-1
restic_netbox_media_volume: netbox_netbox-media-files
restic_netbox_writer_containers:
  - netbox-netbox-worker-1
  - netbox-netbox-1

restic_authentik_backup_enabled: false
restic_authentik_postgres_container: authentik-postgresql-1

restic_openbao_backup_enabled: false
restic_openbao_container: openbao
restic_openbao_address: https://10.78.0.1:8200
restic_openbao_ca_file: /home/debian/openbao/tls/ca.crt
restic_openbao_approle_file: /root/.config/openbao/backup-approle.json

restic_semaphore_backup_enabled: false
restic_semaphore_database_path: /home/debian/.semaphore/semaphore.db
restic_service_path: /etc/systemd/system/infraforge-backup.service
restic_timer_path: /etc/systemd/system/infraforge-backup.timer
restic_backup_host: "{{ ansible_facts['hostname'] | default(inventory_hostname) }}"

# Every source must be selected explicitly in production inventory.
restic_backup_paths: []
restic_exclude_patterns: []
restic_one_file_system: true
restic_exclude_caches: true

restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 6
restic_check_data_subset: 5%

restic_timer_calendar: "*-*-* 03:20:00"
restic_timer_randomized_delay: 20m
restic_timer_persistent: true
