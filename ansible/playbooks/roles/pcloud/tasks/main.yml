---
- name: Validate pCloud configuration
  ansible.builtin.assert:
    that:
      - pcloud_token | length > 0
      - pcloud_mount_point is ansible.builtin.match('^/.+')
    fail_msg: >-
      A pCloud token and an absolute mount point are required. Provide the
      token through Ansible Vault or the PCLOUD_TOKEN environment variable.
  no_log: true

- name: Install rclone and FUSE
  ansible.builtin.apt:
    name:
      - fuse3
      - rclone
    state: present
    update_cache: true

- name: Create the pCloud access group
  ansible.builtin.group:
    name: "{{ pcloud_group }}"
    gid: "{{ pcloud_gid }}"
    state: present

- name: Permit FUSE mounts with allow-other
  ansible.builtin.lineinfile:
    path: /etc/fuse.conf
    regexp: '^#?user_allow_other$'
    line: user_allow_other
    create: true
    owner: root
    group: root
    mode: "0644"

- name: Create pCloud directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ pcloud_mount_point }}"
      group: "{{ pcloud_group }}"
      mode: "0770"
    - path: "{{ pcloud_config_file | dirname }}"
      group: root
      mode: "0755"
    - path: /var/cache/rclone
      group: root
      mode: "0755"

- name: Create the rclone log file
  ansible.builtin.file:
    path: "{{ pcloud_log_file }}"
    state: touch
    owner: root
    group: root
    mode: "0640"
    access_time: preserve
    modification_time: preserve

- name: Configure pCloud credentials
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "{{ pcloud_config_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart pCloud mount

- name: Install the pCloud systemd unit
  ansible.builtin.template:
    src: rclone-pcloud.service.j2
    dest: "{{ pcloud_service_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart pCloud mount

- name: Apply pending pCloud service changes
  ansible.builtin.meta: flush_handlers

- name: Ensure the pCloud mount is enabled and started
  ansible.builtin.systemd_service:
    name: rclone-pcloud.service
    enabled: true
    state: started

- name: Verify the pCloud mount
  ansible.builtin.command:
    argv:
      - mountpoint
      - --quiet
      - "{{ pcloud_mount_point }}"
  register: pcloud_mount_check
  changed_when: false
  retries: 5
  delay: 2
  until: pcloud_mount_check.rc == 0
