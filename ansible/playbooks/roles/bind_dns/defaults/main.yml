---
bind_dns_domain: home.local
# Reverse-zone name for 192.168.10.0/24; keep octets in DNS order.
bind_dns_reverse_prefix: 10.168.192
bind_dns_dir: /opt/bind
bind_dns_image: internetsystemsconsortium/bind9:9.18
bind_dns_forwarders:
  - 1.1.1.1
  - 9.9.9.9
bind_dns_configure_resolver: false
bind_dns_netbox_validate_certs: true
bind_dns_netbox_url: "{{ lookup('env', 'NETBOX_API_ENDPOINT') | default('', true) }}"
bind_dns_netbox_token: "{{ lookup('env', 'NETBOX_API_TOKEN') | default('', true) }}"
bind_dns_compose_path: "{{ bind_dns_dir }}"
