---
- name: Refuse to enable SSH MFA without enrolled YubiKeys
  ansible.builtin.assert:
    that:
      - yubikey_mappings | length > 0
    fail_msg: >-
      yubikey_mappings is empty. Refusing to change SSH authentication because
      this would lock every user out of the host.

- name: Install YubiKey dependencies
  ansible.builtin.apt:
    name:
      - libpam-u2f
      - pcscd
    state: present
    update_cache: true
  become: true

- name: Ensure directory for U2F mappings exists
  ansible.builtin.file:
    path: "{{ yubikey_authfile | dirname }}"
    state: directory
    mode: '0755'
  become: true

- name: Deploy U2F mappings
  ansible.builtin.copy:
    dest: "{{ yubikey_authfile }}"
    content: "{{ (yubikey_mappings | join('\n')) ~ '\n' }}"
    mode: '0600'
    owner: root
    group: root
  become: true

- name: Configure PAM for U2F
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    regexp: '^auth\s+required\s+pam_u2f\.so'
    line: "auth required pam_u2f.so authfile={{ yubikey_authfile }}"
    insertafter: '^@include common-auth'
  notify: Reload sshd
  become: true

- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Ensure sshd loads configuration drop-ins
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/\*\.conf\s*$'
    line: 'Include /etc/ssh/sshd_config.d/*.conf'
    insertbefore: BOF
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Reload sshd
  become: true

- name: Require both public key and U2F for SSH
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/60-yubikey-mfa.conf
    content: |
      KbdInteractiveAuthentication yes
      AuthenticationMethods publickey,keyboard-interactive
    mode: '0644'
    owner: root
    group: root
  notify: Reload sshd
  become: true
