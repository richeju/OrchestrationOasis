---
- name: Determine users enrolled for SSH MFA
  ansible.builtin.set_fact:
    yubikey_enrolled_users: >-
      {{ yubikey_mappings
         | map('regex_replace', ':.*$', '')
         | list }}
    yubikey_effective_admin_user: >-
      {{ yubikey_admin_user | default(ansible_user | default(''), true) }}
  changed_when: false

- name: Refuse to enable SSH MFA without the administration user
  ansible.builtin.assert:
    that:
      - yubikey_mappings | length > 0
      - yubikey_mappings | select('match', '^[A-Za-z_][A-Za-z0-9_-]*:.+') | list | length == yubikey_mappings | length
      - yubikey_effective_admin_user | length > 0
      - yubikey_effective_admin_user in yubikey_enrolled_users
    fail_msg: >-
      Refusing to change SSH authentication. Every mapping must use
      username:credential format and the active administration user
      {{ yubikey_effective_admin_user | default('the administration user', true) }}
      must have an enrolled YubiKey. Set yubikey_admin_user explicitly when
      ansible_user is not defined.

- name: Install YubiKey dependencies
  ansible.builtin.apt:
    name:
      - libpam-u2f
      - pcscd
    state: present
    update_cache: true
  become: true

- name: Ensure directory for U2F mappings exists
  ansible.builtin.file:
    path: "{{ yubikey_authfile | dirname }}"
    state: directory
    mode: '0755'
  become: true

- name: Deploy U2F mappings
  ansible.builtin.copy:
    dest: "{{ yubikey_authfile }}"
    content: "{{ (yubikey_mappings | join('\n')) ~ '\n' }}"
    mode: '0600'
    owner: root
    group: root
  become: true

- name: Configure PAM for U2F
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sshd
    regexp: '^auth\s+required\s+pam_u2f\.so'
    line: "auth required pam_u2f.so authfile={{ yubikey_authfile }}"
    insertafter: '^@include common-auth'
  notify: Reload sshd
  become: true

- name: Ensure sshd drop-in directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: '0755'
    owner: root
    group: root
  become: true

- name: Ensure sshd loads configuration drop-ins
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*Include\s+/etc/ssh/sshd_config\.d/\*\.conf\s*$'
    line: 'Include /etc/ssh/sshd_config.d/*.conf'
    insertbefore: BOF
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Reload sshd
  become: true

- name: Require both public key and U2F for SSH
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/60-yubikey-mfa.conf
    content: |
      KbdInteractiveAuthentication yes
      AuthenticationMethods publickey,keyboard-interactive
    mode: '0644'
    owner: root
    group: root
  notify: Reload sshd
  become: true
