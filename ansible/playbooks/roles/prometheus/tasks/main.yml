---
- name: Parse the Prometheus bind address
  ansible.builtin.set_fact:
    prometheus_bind_octets: "{{ prometheus_bind_address.split('.') }}"
  changed_when: false

- name: Validate the Prometheus bind address
  ansible.builtin.assert:
    that:
      - prometheus_bind_address is match('^[0-9]{1,3}(\.[0-9]{1,3}){3}$')
      - prometheus_bind_octets | length == 4
      - prometheus_bind_octets | map('int') | max <= 255
      - >-
        prometheus_bind_octets | length == 4 and
        (prometheus_bind_address == '127.0.0.1' or
         prometheus_bind_octets[0] | int == 10 or
         (prometheus_bind_octets[0] | int == 192 and
          prometheus_bind_octets[1] | int == 168) or
         (prometheus_bind_octets[0] | int == 172 and
          prometheus_bind_octets[1] | int >= 16 and
          prometheus_bind_octets[1] | int <= 31))
    fail_msg: >-
      prometheus_bind_address must be loopback or an explicit private IPv4
      address. Wildcard publication is refused.

- name: Ensure Prometheus directory exists
  ansible.builtin.file:
    path: "{{ prometheus_dir }}"
    state: directory
    mode: '0755'

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_dir }}/prometheus.yml"
    mode: '0644'

- name: Deploy docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ prometheus_dir }}/docker-compose.yml"
    mode: '0644'

- name: Launch Prometheus stack
  community.docker.docker_compose_v2:
    project_src: "{{ prometheus_dir }}"
    state: present
  register: prometheus_compose

- name: Display compose status
  ansible.builtin.debug:
    var: prometheus_compose
