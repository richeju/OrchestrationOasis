---
- name: Audit the Infraforge VPS without changing it
  hosts: infraforge_vps
  gather_facts: false
  become: true
  tasks:
    - name: Validate the versioned audit topology
      ansible.builtin.assert:
        that:
          - infraforge_audit_required_services | length > 0
          - infraforge_audit_http_services | length > 0
          - infraforge_audit_openbao_url | length > 0
          - infraforge_audit_openbao_ca_path | length > 0
          - infraforge_audit_restic_script | length > 0

    - name: Collect systemd service facts
      ansible.builtin.service_facts:

    - name: Require core administration services
      ansible.builtin.assert:
        that:
          - item in ansible_facts.services
          - ansible_facts.services[item].state == 'running'
        fail_msg: "Required service {{ item }} is absent or not running"
      loop: "{{ infraforge_audit_required_services }}"

    - name: List failed systemd units
      ansible.builtin.command:
        argv:
          - systemctl
          - --failed
          - --no-legend
          - --plain
      register: failed_units
      check_mode: false
      changed_when: false

    - name: Require no failed systemd units
      ansible.builtin.assert:
        that:
          - failed_units.stdout | trim | length == 0
        fail_msg: "Failed systemd units detected: {{ failed_units.stdout | trim }}"

    - name: Probe private HTTP services
      ansible.builtin.uri:
        url: "{{ item.url }}"
        headers: "{{ item.headers | default(omit) }}"
        method: GET
        status_code: "{{ item.status_codes }}"
        follow_redirects: none
      check_mode: false
      loop: "{{ infraforge_audit_http_services }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Probe OpenBao through trusted TLS
      ansible.builtin.uri:
        url: "{{ infraforge_audit_openbao_url }}"
        method: GET
        ca_path: "{{ infraforge_audit_openbao_ca_path }}"
        status_code: "{{ infraforge_audit_openbao_status_codes }}"
        return_content: true
      check_mode: false
      register: openbao_health

    - name: Require OpenBao to be initialized and unsealed
      ansible.builtin.assert:
        that:
          - openbao_health.json.initialized | bool
          - not (openbao_health.json.sealed | bool)
        fail_msg: OpenBao is not initialized and unsealed

    - name: Run the Restic backup audit
      ansible.builtin.command:
        argv:
          - "{{ infraforge_audit_restic_script }}"
      register: restic_audit_raw
      check_mode: false
      changed_when: false

    - name: Parse the Restic audit
      ansible.builtin.set_fact:
        restic_audit: "{{ restic_audit_raw.stdout | from_json }}"

    - name: Require a healthy Restic repository
      ansible.builtin.assert:
        that:
          - restic_audit.status == 'ok'
          - restic_audit.locks | length == 0
        fail_msg: Restic audit reported an unhealthy repository or active locks

    - name: Report the read-only audit summary
      ansible.builtin.debug:
        msg:
          - "Systemd failed units: 0"
          - "OpenBao initialized/unsealed: true/true"
          - "Restic status: {{ restic_audit.status }}"
          - "Restic snapshots: {{ restic_audit.snapshot_count }}"
          - "Restic locks: {{ restic_audit.locks | length }}"
