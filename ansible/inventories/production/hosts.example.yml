---
# Copy this file to hosts.yml and adapt it to your infrastructure.
# hosts.yml is ignored by Git and must never contain plaintext secrets.
# Only linux and docker are enabled by default. Add the host to an optional
# group only after reading docs/deployment.md and the role documentation.
all:
  children:
    linux:
      hosts:
        oasis:
          ansible_host: 192.0.2.10
          ansible_user: admin
    docker:
      hosts:
        oasis:
    ufw:
      hosts: {}
    zerotier:
      hosts: {}
    pcloud:
      hosts: {}
    dashboard:
      hosts: {}
    restic:
      hosts: {}
    prometheus:
      hosts: {}
    netbox:
      hosts: {}
    openbao:
      hosts: {}
    semaphore:
      hosts: {}
    bind_dns:
      hosts: {}
    yubikey:
      hosts: {}
    infraforge_vps:
      hosts: {}
