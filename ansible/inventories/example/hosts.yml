---
# Safe local inventory for syntax checks and discovery. Deployment workflows
# create a private production inventory from the ANSIBLE_INVENTORY secret.
all:
  hosts:
    localhost:
      ansible_connection: local
  children:
    linux:
      hosts:
        localhost:
    docker:
      hosts:
        localhost:
    ufw:
      hosts:
        localhost:
    dashboard:
      hosts:
        localhost:
    pcloud:
      hosts:
        localhost:
    restic:
      hosts:
        localhost:
    prometheus:
      hosts:
        localhost:
    portainer:
      hosts:
        localhost:
    netbox:
      hosts:
        localhost:
    openbao:
      hosts:
        localhost:
    bind_dns:
      hosts:
        localhost:
    k3s:
      hosts:
        localhost:
    zerotier:
      hosts:
        localhost:
    yubikey:
      hosts:
        localhost:
    windows:
      hosts: {}
