---
# Complete Linux orchestration entry point. Every imported playbook targets its
# own inventory group, so a host only receives the services assigned to it.
- name: Apply operating-system updates
  ansible.builtin.import_playbook: playbooks/apply_updates.yml
  tags: [apt]

- name: Install Docker
  ansible.builtin.import_playbook: playbooks/install_docker.yml
  tags: [docker]

- name: Configure the firewall
  ansible.builtin.import_playbook: playbooks/install_ufw.yml
  tags: [ufw]

- name: Configure ZeroTier
  ansible.builtin.import_playbook: playbooks/install_zerotier.yml
  tags: [zerotier]

- name: Mount pCloud
  ansible.builtin.import_playbook: playbooks/install_pcloud.yml
  tags: [pcloud]

- name: Deploy the dashboard
  ansible.builtin.import_playbook: playbooks/install_dashboard.yml
  tags: [dashboard]

- name: Deploy Duplicati
  ansible.builtin.import_playbook: playbooks/install_duplicati.yml
  tags: [duplicati]

- name: Deploy Prometheus
  ansible.builtin.import_playbook: playbooks/install_prometheus.yml
  tags: [prometheus]

- name: Deploy Portainer
  ansible.builtin.import_playbook: playbooks/install_portainer.yml
  tags: [portainer]

- name: Deploy NetBox
  ansible.builtin.import_playbook: playbooks/install_netbox.yml
  tags: [netbox]

- name: Deploy OpenBao
  ansible.builtin.import_playbook: playbooks/install_openbao.yml
  tags: [openbao]

- name: Deploy BIND DNS
  ansible.builtin.import_playbook: playbooks/install_bind_dns.yml
  tags: [bind_dns]

- name: Deploy k3s
  ansible.builtin.import_playbook: playbooks/install_k3s.yml
  tags: [k3s]

- name: Configure YubiKey authentication
  ansible.builtin.import_playbook: playbooks/install_yubikey.yml
  tags: [yubikey]
