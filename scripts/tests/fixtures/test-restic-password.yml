---
- name: Verify Restic password-file safety
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    restic_password_file: "{{ test_output_dir }}/existing.pass"
    restic_repository_password: this-value-must-never-replace-an-existing-password
  tasks:
    - name: Exercise normal adoption with an unrelated password present
      ansible.builtin.include_role:
        name: restic
        tasks_from: password
      vars:
        restic_provision_password_file: false

    - name: Read password file after normal adoption
      ansible.builtin.slurp:
        src: "{{ restic_password_file }}"
      register: restic_password_after_adoption
      no_log: true

    - name: Require existing password to remain unchanged
      ansible.builtin.assert:
        that:
          - restic_password_after_adoption.content | b64decode == 'original-password-file-content\n'

    - name: Exercise explicit provisioning guard against an existing file
      block:
        - name: Attempt forbidden provisioning against an existing file
          ansible.builtin.include_role:
            name: restic
            tasks_from: password
          vars:
            restic_provision_password_file: true

        - name: Record unexpected provisioning success
          ansible.builtin.set_fact:
            restic_guard_unexpectedly_succeeded: true
      rescue:
        - name: Record expected provisioning refusal
          ansible.builtin.set_fact:
            restic_guard_refused_existing_file: true

    - name: Require explicit provisioning to fail before writing
      ansible.builtin.assert:
        that:
          - restic_guard_refused_existing_file | default(false) | bool
          - not (restic_guard_unexpectedly_succeeded | default(false) | bool)

    - name: Read password file after refused provisioning
      ansible.builtin.slurp:
        src: "{{ restic_password_file }}"
      register: restic_password_after_refusal
      no_log: true

    - name: Require refused provisioning to leave content unchanged
      ansible.builtin.assert:
        that:
          - restic_password_after_refusal.content | b64decode == 'original-password-file-content\n'
