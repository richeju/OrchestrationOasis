---
restic_backup_name: test-restic-backup
restic_backup_paths:
  - /etc
  - /var/backups/test
restic_exclude_patterns:
  - /etc/ssl/private/**
restic_exclude_caches: true
restic_one_file_system: true
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 6
restic_check_data_subset: 5%
restic_timer_calendar: "*-*-* 03:20:00"
restic_timer_randomized_delay: 20m
restic_timer_persistent: true
restic_application_backup_enabled: true
restic_application_backup_root: /var/backups/test
restic_netbox_backup_enabled: true
restic_netbox_postgres_container: netbox-postgres-test
restic_netbox_container: netbox-test
restic_netbox_media_volume: netbox-media-test
restic_netbox_writer_containers:
  - netbox-worker-test
  - netbox-test
restic_authentik_backup_enabled: true
restic_authentik_postgres_container: authentik-postgres-test
restic_openbao_backup_enabled: true
restic_openbao_container: openbao-test
restic_openbao_address: https://127.0.0.1:8200
restic_openbao_ca_file: /tmp/test-ca.crt
restic_openbao_approle_file: /tmp/test-approle.json
restic_semaphore_backup_enabled: true
restic_semaphore_database_path: /tmp/test-semaphore.db
restic_hermes_backup_enabled: true
restic_hermes_user: test-hermes
restic_hermes_home: /tmp/test-hermes
restic_hermes_gateway_service: test-hermes-gateway.service
restic_hermes_restore_script_path: /tmp/test-hermes-restore.sh
restic_hermes_state_database_path: /tmp/test-hermes/state.db
restic_hermes_kanban_database_path: /tmp/test-hermes/kanban.db
restic_hermes_archive_entries:
  - .env
  - config.yaml
  - auth.json
  - SOUL.md
  - memories
  - skills
  - cron
  - sessions
  - whatsapp/session
