---
- name: Refuse overlapping Hermes managed archive entries
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    restic_backup_name: test-restic-backup
    restic_repository: rclone:test-remote:Backups/test
    restic_rclone_remote: test-remote
    restic_backup_paths:
      - /etc
    restic_check_data_subset: 5%
    restic_hermes_archive_entries:
      - memories
      - memories/MEMORY.md
  tasks:
    - name: Exercise overlapping managed-path guard
      ansible.builtin.include_role:
        name: restic
        tasks_from: validate
