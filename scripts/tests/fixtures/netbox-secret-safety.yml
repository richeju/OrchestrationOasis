---
- name: Exercise NetBox secret-length safety guard
  hosts: localhost
  gather_facts: false
  vars:
    netbox_compact_stack_confirmed: true
    netbox_db_password: database-password-long-enough
    netbox_redis_password: redis-password-long-enough
    netbox_secret_key: "1234567890123456789012345678901234567890123456789"
  roles:
    - netbox
