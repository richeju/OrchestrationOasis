services:
  trivy:
    image: aquasec/trivy:0.72.0
    command: >-
      fs --scanners vuln,misconfig,secret --ignore-unfixed --exit-code 1
      --severity HIGH,CRITICAL --skip-dirs /project/.venv
      --skip-dirs /project/.git --skip-dirs /project/.trivy-cache /project
    volumes:
      - ./:/project:ro
      - ./.trivy-cache:/root/.cache/
